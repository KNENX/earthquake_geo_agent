<!DOCTYPE html>
<html>

<head>
    <title>Leaflet Tile Test</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
    <style>
        body {
            padding: 0;
            margin: 0;
        }

        html,
        body,
        #map {
            height: 100%;
            width: 100%;
        }
    </style>
</head>

<body>
    <div id="map"></div>
    <script>
        // 1. Define layers
        const darkMatter = L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png", { maxZoom: 19 });
        const satellite = L.tileLayer("https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}", { maxZoom: 19 });

        // The problematic layer
        const gaode = L.tileLayer("http://webrd01.is.autonavi.com/appmaptile?lang=zh_cn&size=1&scale=1&style=8&x={x}&y={y}&z={z}", {
            maxZoom: 19,
            attribution: "© Gaode"
        });

        // 2. Init map
        const map = L.map("map", {
            center: [39.9, 116.4],
            zoom: 10,
            layers: [gaode]
        });

        // 3. Add Control
        const baseMaps = {
            "Gaode": gaode,
            "Dark": darkMatter,
            "Satellite": satellite
        };
        L.control.layers(baseMaps).addTo(map);

        // Add event listeners to debug when a layer is removed
        map.on('layerremove', function (e) {
            console.log('Layer removed from map:', e.layer);
            if (e.layer === gaode) console.error('GAODE REMOVED!');
        });

        map.on('layeradd', function (e) {
            console.log('Layer added to map:', e.layer);
        });
    </script>
</body>

</html>
