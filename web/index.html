<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Earthquake Command | AI Agent</title>
  <meta name="description" content="Immersive AI-powered earthquake data visualization platform." />

  <!-- Fonts: Inter (UI) & JetBrains Mono (Data) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;700&display=swap"
    rel="stylesheet">

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"
    crossorigin="anonymous" referrerpolicy="no-referrer" />

  <!-- Leaflet JS (Core) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js" crossorigin="anonymous"
    referrerpolicy="no-referrer"></script>

  <!-- Leaflet Heatmap Plugin -->
  <script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>

  <!-- Chart.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>

  <!-- Marked.js for Markdown parsing in chat -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <!-- DOMPurify for XSS Sanitization -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.9/purify.min.js"></script>

  <!-- Highlight.js for Syntax Highlighting -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

  <!-- Main Styles -->
  <link rel="stylesheet" href="/src/style.css">

  <!-- noUiSlider -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/noUiSlider/15.7.1/nouislider.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/noUiSlider/15.7.1/nouislider.min.js"></script>
</head>

<body>
  <!-- Level 0: Background Map -->
  <div id="map"></div>

  <!-- Level 1: HUD Interface Overlay -->

  <!-- Top Search Bar -->
  <div id="search-container">
    <div class="search-wrapper glass-panel">
      <button id="btn-locate" title="定位当前位置">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <crosshair cx="12" cy="12" r="10"></crosshair>
          <line x1="22" y1="12" x2="18" y2="12"></line>
          <line x1="6" y1="12" x2="2" y2="12"></line>
          <line x1="12" y1="6" x2="12" y2="2"></line>
          <line x1="12" y1="22" x2="12" y2="18"></line>
        </svg>
      </button>
      <input type="text" id="nl" placeholder="指令输入: 搜索区域、震级或提问..." autocomplete="off" />
    </div>
    <button id="run-nl">
      <span id="btn-text">查询</span>
      <span id="btn-loader" class="loader hidden"></span>
    </button>
    <button id="btn-filter-toggle" class="filter-toggle-btn glass-panel" title="二次筛选">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"></polygon>
      </svg>
    </button>

    <!-- Secondary Filter Panel (drops down from search bar) -->
    <div id="filter-panel" class="glass-panel hidden">
      <div class="filter-header">
        <span class="filter-title">🔍 二次筛选</span>
        <button id="filter-close" class="filter-close-btn">✕</button>
      </div>
      <div class="filter-body">
        <div class="filter-group">
          <label class="filter-label">震级范围</label>
          <div class="filter-range-display">
            <span id="mag-min-val">0</span> — <span id="mag-max-val">10</span>
          </div>
          <div id="filter-mag-slider" class="styled-slider"></div>
        </div>
        <div class="filter-group">
          <label class="filter-label">震源深度 (km)</label>
          <div class="filter-range-display">
            <span id="depth-min-val">0</span> — <span id="depth-max-val">700</span>
          </div>
          <div id="filter-depth-slider" class="styled-slider"></div>
        </div>
        <div class="filter-stats" id="filter-stats">当前显示：-- 条</div>
        <button id="filter-reset" class="filter-reset-btn">↺ 重置筛选</button>
      </div>
    </div>
  </div>

  <!-- Left Side: Data Stream Panel -->
  <div id="info-panel" class="glass-panel hidden">
    <div class="panel-header">
      <span class="panel-title">地震数据监控</span>
      <button id="close-info" title="最小化面板">×</button>
    </div>

    <div class="panel-content-scroll">
      <!-- Stats Grid -->
      <div id="info-main-stats">
        <div class="stat-card">
          <span class="stat-number" id="stat-count">0</span>
          <span class="stat-label">监测数量</span>
        </div>
        <div class="stat-card">
          <span class="stat-number" id="stat-max-mag">-</span>
          <span class="stat-label">最大震级</span>
        </div>
      </div>

      <!-- Charts -->
      <div id="info-charts-section">
        <div class="chart-container">
          <div class="chart-title">震级分布</div>
          <div class="chart-canvas-wrapper">
            <canvas id="mag-chart"></canvas>
          </div>
        </div>
        <div class="chart-container">
          <div class="chart-title">深度概况</div>
          <div class="chart-canvas-wrapper">
            <canvas id="depth-chart"></canvas>
          </div>
        </div>
      </div>

      <!-- AI Analysis -->
      <div class="list-section">
        <div class="section-header" id="toggle-ai-details">智能简报 (AI BRIEF)</div>
        <ul class="info-list hidden" id="ai-details-list">
          <!-- JS Injected -->
        </ul>
        <div class="timing-info" id="timing-info" style="font-size: 10px; color: #555; margin-top: 5px;"></div>
      </div>

      <!-- Raw List -->
      <div class="list-section">
        <div class="section-header" id="toggle-quake-list">事件日志</div>
        <div id="quake-list-container">
          <ul id="quake-list">
            <!-- JS Injected -->
          </ul>
        </div>
      </div>
    </div>
  </div>

  <!-- Map Legend -->
  <div id="map-legend" class="glass-panel">
    <div class="legend-title">震级图例</div>
    <div class="legend-items">
      <div class="legend-item"><span class="legend-color" style="background: #0ea5e9;"></span><span>&lt;4.0</span></div>
      <div class="legend-item"><span class="legend-color" style="background: #22c55e;"></span><span>4.0 - 5.0</span>
      </div>
      <div class="legend-item"><span class="legend-color" style="background: #eab308;"></span><span>5.0 - 6.0</span>
      </div>
      <div class="legend-item"><span class="legend-color" style="background: #f97316;"></span><span>6.0 - 7.0</span>
      </div>
      <div class="legend-item"><span class="legend-color" style="background: #ef4444;"></span><span>≥7.0</span></div>
    </div>
  </div>

  <!-- Minimized Icon Trigger -->
  <button id="info-panel-icon" class="hidden" title="Open Data Stream">
    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
      stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 20v-6M6 20V10M18 20V4" />
    </svg>
  </button>

  <!-- Mission Control (Right Bottom Tools) -->
  <div id="mission-control">
    <!-- Layer Toggle -->
    <button class="control-btn" id="btn-layer-toggle" title="切换底图 (标准/卫星/深色)">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="12 2 2 7 12 12 22 7 12 2"></polygon>
        <polyline points="2 17 12 22 22 17"></polyline>
        <polyline points="2 12 12 17 22 12"></polyline>
      </svg>
    </button>

    <!-- Heatmap Toggle -->
    <button class="control-btn" id="btn-toggle-heat" title="切换热力图">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path
          d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.1.2-2.2.5-3.3a9 9 0 0 0 3.5 5.8">
        </path>
      </svg>
    </button>

    <!-- Zoom Controls -->
    <button class="control-btn" id="btn-zoom-in" title="放大地图">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"></circle>
        <line x1="12" y1="8" x2="12" y2="16"></line>
        <line x1="8" y1="12" x2="16" y2="12"></line>
      </svg>
    </button>
    <button class="control-btn" id="btn-zoom-out" title="缩小地图">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"></circle>
        <line x1="8" y1="12" x2="16" y2="12"></line>
      </svg>
    </button>

    <!-- Export Data -->
    <div style="position:relative;">
      <button class="control-btn" id="btn-export-trigger" title="导出数据">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
          <polyline points="7 10 12 15 17 10"></polyline>
          <line x1="12" y1="15" x2="12" y2="3"></line>
        </svg>
      </button>
      <div id="export-menu" class="hidden glass-panel">
        <button class="export-option" data-type="csv">导出 CSV</button>
        <button class="export-option" data-type="geojson">导出 GeoJSON</button>
      </div>
    </div>

  </div>
  </div>

  <!-- AI Chat Toggle (Floating Bottom Right) -->
  <button class="control-btn" id="chat-toggle-btn" title="AI 地震助手">
    <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor"
      stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
    </svg>
  </button>

  <!-- Chat Sidebar (Positioned absolutely via CSS) -->
  <div id="chat-sidebar" class="glass-panel hidden">
    <div class="panel-header">
      <span class="panel-title">AI 地震助手</span>
      <button id="chat-clear" title="清除对话" style="background:none;border:none;color:#666;cursor:pointer;">🗑️</button>
    </div>

    <div id="chat-messages">
      <div class="chat-bubble ai">
        系统就绪。<br>随时待命分析全球地震数据与地质态势。
      </div>
    </div>

    <!-- Quick Prompts Chips -->
    <div id="chat-quick-prompts" class="chat-quick-prompts">
      <button class="prompt-chip" data-query="请总结本次查询的整体情况">📊 总结本次查询</button>
      <button class="prompt-chip" data-query="列出本次受影响最严重的地区">⚠️ 关注影响地区</button>
      <button class="prompt-chip" data-query="帮我分析一下这次的震级分布">📈 震级分布分析</button>
    </div>

    <div id="chat-input-area">
      <textarea id="chat-input" placeholder="输入指令或提问 (Enter 发送, Shift+Enter 换行)..." rows="1"></textarea>
      <button id="chat-send">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>

</html>
