<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Earthquake AI Agent</title>
  <meta name="description"
    content="AI-powered earthquake data search and expert chat assistant. Query global earthquake data or ask questions about seismology." />
  <!-- 引入 Google Fonts 提升质感 -->
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <!-- Chart.js for data visualization -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>

<body>
  <!-- 地图容器 (全屏) -->
  <div id="map"></div>

  <!-- 修改搜索栏部分 -->
  <div id="search-container">
    <div class="input-group">
      <input type="text" id="nl" placeholder="搜地震数据或问我地震知识..." />

      <!-- 新增：定位按钮 -->
      <button id="btn-locate" title="查询我附近的地震" style="margin-right: 2px;">
        📍
      </button>

      <button id="run-nl">
        <span id="btn-text">发送</span>
        <span id="btn-loader" class="loader hidden"></span>
      </button>
    </div>
  </div>

  <!-- Info Panel Minimized Icon -->
  <button id="info-panel-icon" class="hidden" title="展开信息面板">
    📊
  </button>

  <!-- Info Panel - Restructured -->
  <div id="info-panel" class="hidden">
    <button id="close-info" title="最小化">−</button>

    <!-- Core Stats Section -->
    <div id="info-stats-section">
      <div id="info-main-stats">
        <div class="stat-item">
          <span class="stat-number" id="stat-count">0</span>
          <span class="stat-label">次地震</span>
        </div>
        <div class="stat-item">
          <span class="stat-number" id="stat-max-mag">-</span>
          <span class="stat-label">最大震级</span>
        </div>
      </div>
    </div>

    <!-- Charts Section -->
    <div id="info-charts-section">
      <div class="chart-container">
        <div class="chart-title">震级分布</div>
        <canvas id="mag-chart"></canvas>
      </div>
      <div class="chart-container">
        <div class="chart-title">深度分布</div>
        <canvas id="depth-chart"></canvas>
      </div>
    </div>

    <!-- Collapsible: AI Understanding -->
    <div class="collapsible-section">
      <button class="collapsible-header" id="toggle-ai-details">
        <span>🧠 AI 理解结果</span>
        <span class="collapse-icon">▼</span>
      </button>
      <div class="collapsible-content hidden" id="ai-details-content">
        <ul class="info-list" id="ai-details-list">
          <!-- Filled by JS -->
        </ul>
        <div class="timing-info" id="timing-info">
          <!-- Timing info filled by JS -->
        </div>
      </div>
    </div>

    <!-- Collapsible: Earthquake List -->
    <div class="collapsible-section">
      <button class="collapsible-header" id="toggle-quake-list">
        <span>📋 详细列表</span>
        <span class="collapse-icon">▼</span>
      </button>
      <div class="collapsible-content hidden" id="quake-list-container">
        <ul id="quake-list">
          <!-- Filled by JS -->
        </ul>
      </div>
    </div>
  </div>

  <!-- Right Sidebar: Chat Area -->
  <div id="chat-sidebar">
    <div id="chat-header">
      <span>💬 地震知识问答</span>
      <button id="chat-clear" title="清空对话">🗑️</button>
    </div>
    <div id="chat-messages">
      <div class="chat-bubble ai">你好！我是地震知识助手，有什么关于地震的问题都可以问我。</div>
    </div>
    <div id="chat-input-area">
      <input type="text" id="chat-input" placeholder="输入问题，如：地震是怎么形成的？" />
      <button id="chat-send">发送</button>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>

</html>
